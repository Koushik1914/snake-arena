name: CI/CD — Snake Arena

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1: Type-check and build verification
  # ─────────────────────────────────────────────────────────────
  build:
    name: Type Check & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json
            server/package-lock.json

      - name: Install C++ build tools
        run: sudo apt-get install -y build-essential python3

      - name: Install shared dependencies
        run: npm install
        working-directory: shared

      - name: Install client dependencies
        run: npm ci
        working-directory: client

      - name: Install server dependencies
        run: npm ci
        working-directory: server

      - name: Type-check client
        run: npx tsc --noEmit
        working-directory: client

      - name: Type-check server
        run: npx tsc --noEmit
        working-directory: server

      - name: Build client (Vite)
        run: npm run build
        working-directory: client

      - name: Build server (TypeScript + C++ addon)
        run: npm run build
        working-directory: server

      - name: Upload client dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/dist/
          retention-days: 1

  # ─────────────────────────────────────────────────────────────
  # Job 2: Docker build validation
  # ─────────────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push — validation only)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: snake-arena:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────
  # Job 3: Push to Docker Hub (on main branch only)
  # Requires secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN
  # ─────────────────────────────────────────────────────────────
  publish:
    name: Publish Docker Image
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: ${{ secrets.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push to Docker Hub
        if: ${{ secrets.DOCKERHUB_USERNAME != '' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/snake-arena:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/snake-arena:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
