version: '3.8'

services:
  # ── Game Server (Node.js + C++ N-API) ──────────────────────────────────────
  game:
    build:
      context: .
      dockerfile: Dockerfile
    image: snake-arena:latest
    container_name: snake-arena-game
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MAX_ROOMS=10
      - MAX_PLAYERS_PER_ROOM=20
      - TICK_RATE=20
    volumes:
      - logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - snake-net

  # ── Nginx Reverse Proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: snake-arena-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.http.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      game:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - snake-net

volumes:
  logs:
    driver: local

networks:
  snake-net:
    driver: bridge
