# ===========================================================================
# Nginx Reverse Proxy — Neon Reptilia Game Server
# ===========================================================================
#
# Architecture:
#   Browser ──HTTPS/WSS──▶ Nginx (443) ──HTTP/WS──▶ Node.js cluster (3000)
#
# Key features:
#   - ip_hash upstream for WebSocket sticky sessions (PM2 cluster mode)
#   - Long-lived WebSocket proxy (3600s read timeout)
#   - Gzip for static assets
#   - Security headers
#   - HTTP → HTTPS redirect

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
  worker_connections 4096;
  use epoll;
  multi_accept on;
}

http {
  include      /etc/nginx/mime.types;
  default_type application/octet-stream;

  # ── Logging ──────────────────────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent" rt=$request_time';
  access_log /var/log/nginx/access.log main;

  # ── Performance ──────────────────────────────────────────────────────────
  sendfile           on;
  tcp_nopush         on;
  tcp_nodelay        on;
  keepalive_timeout  65;
  types_hash_max_size 2048;

  # ── Gzip (static assets only; binary WS frames bypass gzip) ─────────────
  gzip              on;
  gzip_vary         on;
  gzip_types        text/plain text/css application/javascript
                    application/json application/wasm;
  gzip_comp_level   4;
  gzip_min_length   512;

  # ── Upstream: Node.js PM2 cluster (ip_hash for WS stickiness) ────────────
  upstream game_backend {
    ip_hash;
    server 127.0.0.1:3000;
    keepalive 64;
  }

  # ── HTTP → HTTPS redirect ────────────────────────────────────────────────
  server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  # ── HTTPS + WSS server ───────────────────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name _;

    # TLS — replace with real certs in production
    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── Security Headers ───────────────────────────────────────────────────
    add_header X-Frame-Options         "SAMEORIGIN"    always;
    add_header X-Content-Type-Options  "nosniff"       always;
    add_header X-XSS-Protection        "1; mode=block" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy
      "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self' wss:; img-src 'self' data:" always;

    # ── Static Assets (frontend bundle) ───────────────────────────────────
    root /app/client/dist;
    index index.html;

    # Long cache for hashed bundles
    location ~* \.(js|css|wasm|woff2?)$ {
      expires     1y;
      add_header  Cache-Control "public, immutable";
      try_files   $uri =404;
    }

    # SPA fallback
    location / {
      try_files $uri $uri/ /index.html;
    }

    # ── WebSocket Proxy (/ws path) ─────────────────────────────────────────
    location /ws {
      proxy_pass         http://game_backend;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "Upgrade";
      proxy_set_header   Host       $host;
      proxy_set_header   X-Real-IP  $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

      # Long timeouts for persistent WebSocket connections
      proxy_read_timeout  3600s;
      proxy_send_timeout  3600s;
      proxy_connect_timeout 10s;

      # Disable proxy buffering for real-time binary frames
      proxy_buffering off;
    }

    # ── Health check passthrough ──────────────────────────────────────────
    location /health {
      proxy_pass http://game_backend;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
    }
  }
}
