# ===========================================================================
# Nginx Reverse Proxy — Snake Arena (HTTP mode for staging / Docker)
# ===========================================================================
#
# Use this config when TLS is terminated upstream (Cloudflare, AWS ALB, etc.)
# or when testing locally with Docker Compose.
#
# For production with self-managed TLS, use nginx.conf instead.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
  worker_connections 4096;
  use epoll;
  multi_accept on;
}

http {
  include      /etc/nginx/mime.types;
  default_type application/octet-stream;

  # ── Logging ──────────────────────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent" rt=$request_time';
  access_log /var/log/nginx/access.log main;

  # ── Performance ──────────────────────────────────────────────────────────
  sendfile           on;
  tcp_nopush         on;
  tcp_nodelay        on;
  keepalive_timeout  65;
  types_hash_max_size 2048;

  # ── Gzip ─────────────────────────────────────────────────────────────────
  gzip              on;
  gzip_vary         on;
  gzip_types        text/plain text/css application/javascript
                    application/json application/wasm;
  gzip_comp_level   4;
  gzip_min_length   512;

  # ── Upstream: Node.js game server ─────────────────────────────────────────
  upstream game_backend {
    ip_hash;
    server game:3000;
    keepalive 64;
  }

  server {
    listen 80;
    server_name _;

    # ── Security Headers ─────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Static Assets (frontend bundle) ──────────────────────────────────
    root /app/client/dist;
    index index.html;

    # Long cache for hashed bundles
    location ~* \.(js|css|wasm|woff2?)$ {
      expires     1y;
      add_header  Cache-Control "public, immutable";
      try_files   $uri =404;
    }

    # SPA fallback
    location / {
      try_files $uri $uri/ /index.html;
    }

    # ── WebSocket Proxy (/ws path) ────────────────────────────────────────
    location /ws {
      proxy_pass         http://game_backend;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "Upgrade";
      proxy_set_header   Host       $host;
      proxy_set_header   X-Real-IP  $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

      # Long timeouts for persistent WebSocket connections
      proxy_read_timeout  3600s;
      proxy_send_timeout  3600s;
      proxy_connect_timeout 10s;

      # Disable proxy buffering for real-time binary frames
      proxy_buffering off;
    }

    # ── Health check passthrough ──────────────────────────────────────────
    location /health {
      proxy_pass http://game_backend;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
    }
  }
}
